            <path d="M 520,820 L 535,810 M 530,860 L 545,850 M 540,900 L 555,890" />
            <path d="M 500,830 L 515,820 M 510,870 L 525,860 M 520,910 L 535,900" />

            <!-- Grain du bois et noeuds sur la branche -->
            <path d="M 170,755 Q 260,745 340,750" />
            <path d="M 180,765 Q 260,755 350,760" />
            <path d="M 190,775 Q 260,765 350,770" />
            <path d="M 200,785 Q 260,775 350,780" />

