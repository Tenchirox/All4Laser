<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">

      <!-- COULEUR 2: Gravure laser (Black / Deep Engrave) -->
      <!-- Utilise pour les ombres profondes, le contraste du bec, l'oeil, et l'écorce -->
      <g id="gravure_profonde" fill="#000000">

            <!-- Oeil et sourcil profond -->
            <circle cx="380" cy="170" r="6" />
            <path d="M 360,155 Q 380,150 400,160 Q 380,165 360,155 Z" />

            <!-- Ouverture du bec et narine -->
            <path d="M 180,230 C 220,225 250,210 280,200 C 270,195 240,215 180,230 Z" />
            <ellipse cx="270" cy="180" rx="8" ry="3" transform="rotate(-20 270 180)" />

            <!-- Serres / Griffes de l'aigle -->
            <!-- Patte gauche -->
            <path d="M 360,700 Q 340,730 345,750 Q 360,740 370,720 Z" />
            <path d="M 380,695 Q 365,725 370,745 Q 385,735 390,715 Z" />
            <!-- Patte droite -->
            <path d="M 405,705 Q 390,735 395,755 Q 410,745 415,725 Z" />
            <path d="M 425,710 Q 410,740 415,760 Q 430,750 435,730 Z" />

            <!-- Ombres profondes du feuillage / plumes des ailes -->
            <path d="M 680,480 C 710,540 740,630 770,710 C 760,650 730,550 690,490 Z" />
            <path d="M 650,490 C 680,550 710,640 740,720 C 730,660 700,560 660,500 Z" />
            <path d="M 620,500 C 650,560 680,650 710,730 C 700,670 670,570 630,510 Z" />
            <path d="M 590,510 C 620,570 650,660 680,740 C 670,680 640,580 600,520 Z" />

            <path d="M 600,430 Q 640,460 690,480 Q 650,440 600,410 Z" />
            <path d="M 560,440 Q 600,470 650,490 Q 610,450 560,420 Z" />
            <path d="M 520,450 Q 560,480 610,500 Q 570,460 520,430 Z" />

            <!-- Ombres profondes de la queue -->
            <path d="M 540,770 C 560,840 580,900 620,950 C 590,900 570,840 520,780 Z" />
            <path d="M 500,780 C 520,850 540,910 580,960 C 550,910 530,850 480,790 Z" />

            <!-- Ombres sous la branche (Ecorce) -->
            <path d="M 160,790 Q 200,800 250,780 L 250,790 Q 200,810 160,800 Z" />
            <path d="M 680,770 Q 750,780 820,775 L 820,785 Q 750,790 680,780 Z" />

      </g>

      <!-- COULEUR 3: Gravure legere laser (Blue / Light Engrave) -->
