name: Dual Platform Release

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  APP_NAME: all4laser

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libudev-dev \
            libasound2-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libfreetype6-dev

      - name: Build Linux release
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package Linux artifact
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/${APP_NAME} dist/${APP_NAME}
          tar -C dist -czf ${APP_NAME}-linux-x86_64.tar.gz ${APP_NAME}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: ${{ env.APP_NAME }}-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package Windows artifact
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\$env:APP_NAME.exe" "dist\$env:APP_NAME.exe"
          Compress-Archive -Path "dist\$env:APP_NAME.exe" -DestinationPath "$env:APP_NAME-windows-x86_64.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: ${{ env.APP_NAME }}-windows-x86_64.zip

  publish-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version tag
        id: version
        run: |
          git fetch --tags --force
          latest_tag=$(git tag --list "v*" --sort=-v:refname | head -n 1)

          if [ -z "$latest_tag" ]; then
            next_tag="v0.1.0"
          else
            current="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$current"
            if [ -z "$major" ] || [ -z "$minor" ] || [ -z "$patch" ]; then
              echo "Unexpected tag format: $latest_tag"
              exit 1
            fi
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "name=Release $next_tag" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact files
        run: |
          mkdir -p release
          find dist -type f -name "*.zip" -exec cp {} release/ \;
          find dist -type f -name "*.tar.gz" -exec cp {} release/ \;
          ls -la release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/*.tar.gz
          generate_release_notes: true
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.name }}
          draft: false
          prerelease: false
